<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Food App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <h2>🍽️ FoodHub</h2>
  <input type="text" placeholder="Search food..." id="searchBox" onkeyup="searchFood()">
</nav>
<div class="categories">
  <button onclick="filterFood('all')">All</button>
  <button onclick="filterFood('burger')">🍔 Burger</button>
  <button onclick="filterFood('pizza')">🍕 Pizza</button>
  <button onclick="filterFood('pasta')">🍝 Pasta</button>
</div>
<div class="item burger">
<div class="item pizza">
<div class="item pasta">
<h1>🍔 Food Ordering App</h1>

<div class="menu">

  <div class="item">
    <h2>🍔 Burger</h2>
    <p>₹120</p>
    <button onclick="addToCart('Burger')">Add to Cart</button>
  </div>

  <div class="item">
    <h2>🍕 Pizza</h2>
    <p>₹250</p>
    <button onclick="addToCart('Pizza')">Add to Cart</button>
  </div>

  <div class="item">
    <h2>🍝 Pasta</h2>
    <p>₹180</p>
    <button onclick="addToCart('Pasta')">Add to Cart</button>
  </div>

</div>

<h2>🛒 Cart:</h2>
<ul id="cart"></ul>

<script src="script.js"></script>
</body>
</html>
