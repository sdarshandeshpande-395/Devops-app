<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bhojanalaya</title>

<style>
    body {
        margin: 0;
        font-family: 'Georgia', serif;
        background: linear-gradient(to right, #fff3e0, #ffe0b2);
        color: #4e342e;
    }

    header {
        text-align: center;
        padding: 20px;
        background-color: #bf360c;
        color: white;
        border-bottom: 5px solid #ffcc80;
    }

    /* Unique traditional-style font */
    .title {
        font-size: 50px;
        letter-spacing: 6px;
        text-transform: uppercase;
        font-weight: bold;
        font-family: "Papyrus", "Brush Script MT", cursive;
    }

    .menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .item {
        border: 2px solid #d84315;
        border-radius: 12px;
        padding: 15px;
        background-color: #fff8e1;
        text-align: center;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }

    .item h3 {
        margin: 10px 0;
    }

    button {
        background-color: #d84315;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 6px;
    }

    button:hover {
        background-color: #bf360c;
    }

    .cart {
        position: fixed;
        right: 20px;
        top: 20px;
        background: white;
        padding: 15px;
        border: 2px solid #d84315;
        border-radius: 12px;
        width: 260px;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    }

    .cart h2 {
        margin-top: 0;
        text-align: center;
    }

    .remove-btn {
        background: red;
        margin-left: 10px;
        padding: 5px 8px;
        font-size: 12px;
    }

    .clear-btn {
        margin-top: 10px;
        width: 100%;
        background: #6d4c41;
    }

    .clear-btn:hover {
        background: #4e342e;
    }
</style>
</head>

<body>

<header>
    <div class="title">Bhojanalaya</div>
    <p>Authentic Indian Taste</p>
</header>

<div class="menu" id="menu"></div>

<div class="cart">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
</div>

<script>
    const dishes = [
        {name: "Butter Chicken", price: 250},
        {name: "Paneer Tikka", price: 200},
        {name: "Masala Dosa", price: 120},
        {name: "Biryani", price: 220},
        {name: "Chole Bhature", price: 150},
        {name: "Dal Makhani", price: 180},
        {name: "Rajma Chawal", price: 140},
        {name: "Pav Bhaji", price: 130},
        {name: "Samosa", price: 40},
        {name: "Vada Pav", price: 50},
        {name: "Tandoori Roti", price: 20},
        {name: "Palak Paneer", price: 190},
        {name: "Aloo Paratha", price: 90},
        {name: "Gulab Jamun", price: 80},
        {name: "Rasgulla", price: 70}
    ];

    let cart = [];

    const menu = document.getElementById("menu");
    const cartItems = document.getElementById("cart-items");
    const totalDisplay = document.getElementById("total");

    // Load menu
    dishes.forEach((dish) => {
        const div = document.createElement("div");
        div.classList.add("item");

        div.innerHTML = `
            <h3>${dish.name}</h3>
            <p>₹${dish.price}</p>
            <button onclick="addToCart('${dish.name}', ${dish.price})">
                Add to Cart
            </button>
        `;

        menu.appendChild(div);
    });

    function addToCart(name, price) {
        cart.push({ name, price });
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function clearCart() {
        cart = [];
        renderCart();
    }

    function renderCart() {
        cartItems.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;

            const li = document.createElement("li");
            li.innerHTML = `
                ${item.name} - ₹${item.price}
                <button class="remove-btn" onclick="removeFromCart(${index})">X</button>
            `;

            cartItems.appendChild(li);
        });

        totalDisplay.textContent = total;
    }
</script>

</body>
</html>
